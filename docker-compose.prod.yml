name: shotlens
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-shotlens}
    volumes:
      - postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        INFISICAL_CLI_VERSION: ${INFISICAL_CLI_VERSION:-0.43.60}
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/shotlens}
    entrypoint: ["bun", "run", "db:migrate"]
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        INFISICAL_CLI_VERSION: ${INFISICAL_CLI_VERSION:-0.43.60}
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/shotlens}
      MEDIA_DIR: /media
      INFISICAL_MACHINE_CLIENT_ID: ${INFISICAL_MACHINE_CLIENT_ID:-}
      INFISICAL_MACHINE_CLIENT_SECRET: ${INFISICAL_MACHINE_CLIENT_SECRET:-}
      INFISICAL_PROJECT_ID: ${INFISICAL_PROJECT_ID:-}
      INFISICAL_SECRET_ENV: ${INFISICAL_SECRET_ENV:-dev}
      INFISICAL_API_URL: ${INFISICAL_API_URL:-}
    volumes:
      - media:/media
    depends_on:
      migrate:
        condition: service_completed_successfully

  analyzer:
    build:
      context: .
      dockerfile: apps/analyzer/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/shotlens}
      MEDIA_DIR: /media
    volumes:
      - media:/media
    depends_on:
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Baked into Nitro `routeRules` proxy at `vite build`; runtime `environment` does not change it.
        API_URL: http://api:3001
        INFISICAL_CLI_VERSION: ${INFISICAL_CLI_VERSION:-0.43.60}
    environment:
      VITE_BASE_URL: ${SERVICE_URL_WEB} # coolify service url
      API_URL: http://api:3001
      INFISICAL_MACHINE_CLIENT_ID: ${INFISICAL_MACHINE_CLIENT_ID:-}
      INFISICAL_MACHINE_CLIENT_SECRET: ${INFISICAL_MACHINE_CLIENT_SECRET:-}
      INFISICAL_PROJECT_ID: ${INFISICAL_PROJECT_ID:-}
      INFISICAL_SECRET_ENV: ${INFISICAL_SECRET_ENV:-dev}
      INFISICAL_API_URL: ${INFISICAL_API_URL:-}
    depends_on:
      - api

volumes:
  postgres:
    driver: local
  media:
    driver: local
